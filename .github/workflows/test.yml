name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: poetry install --with dev
      - name: Test
        run: poetry run pytest tests --cov=fable_broker --cov-branch --cov-fail-under=90
    services:
      neo4j:
        image: neo4j:5.26.27-community
        env:
          NEO4J_AUTH: none
        ports:
          - 7474:7474
          - 7687:7687
      amqp:
        image: rabbitmq:3.13.7
        ports:
          - 5672:5672
      redis:
        image: redis:8.6.4
        ports:
          - 6379:6379
      matcher:
        image: ghcr.io/ul-mds/fable-pprl-service:0.2.1
        env:
          ROLE: linkage_unit
        ports:
          - 8080:8080
